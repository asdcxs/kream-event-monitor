name: KREAM Event Monitor

on:
  schedule:
    # 매일 한국 시간 오전 10시 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kream-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run event monitor (alert)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start

      - name: Generate ranked HTML (feepromo)
        run: node src/rank-exhibition.js feepromo
        continue-on-error: true

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain data/ docs/)" ]]; then
            git config user.name "kream-monitor-bot"
            git config user.email "actions@github.com"
            git add data/seen-events.json data/seen-benefits.json data/notify-state.json data/benefits-cache.json data/feepromo-cache.json docs/
            git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%MZ)" || echo "nothing to commit"
            git push || echo "push failed"
          else
            echo "변경 없음"
          fi
